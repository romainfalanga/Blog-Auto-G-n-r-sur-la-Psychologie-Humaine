<!DOCTYPE html>
<html lang="fr">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  {{ partial "header.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script>
  (function(){
    // Scroll-reveal: elements with .reveal or .reveal-card appear on scroll
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){
          e.target.classList.add('is-visible');
          io.unobserve(e.target);
        }
      });
    }, {threshold: 0.08, rootMargin: '0px 0px -40px 0px'});
    document.querySelectorAll('.reveal, .reveal-card').forEach(function(el){ io.observe(el); });

    // Dynamic line-clamp: fill excerpt area completely
    function adjustExcerpts(){
      document.querySelectorAll('.article-card .card-excerpt').forEach(function(el){
        el.style.webkitLineClamp = 'unset';
        var lh = parseFloat(getComputedStyle(el).lineHeight);
        var h = el.clientHeight;
        if(lh > 0 && h > 0){
          el.style.webkitLineClamp = Math.floor(h / lh);
        }
      });
    }
    adjustExcerpts();
    window.addEventListener('resize', adjustExcerpts);
  })();
  </script>
</body>
</html>
