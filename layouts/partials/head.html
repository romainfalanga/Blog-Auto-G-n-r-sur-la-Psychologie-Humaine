<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

{{- if .IsHome }}
<title>{{ .Site.Title }}</title>
{{- else }}
<title>{{ .Title }} | {{ .Site.Params.siteName }}</title>
{{- end }}

<meta name="description" content="{{ .Description | default .Site.Params.description }}">
<link rel="canonical" href="{{ .Permalink }}">

<!-- Open Graph -->
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ .Description | default .Site.Params.description }}">
{{- if .IsPage }}
<meta property="og:type" content="article">
{{- else }}
<meta property="og:type" content="website">
{{- end }}
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:site_name" content="{{ .Site.Params.siteName }}">
<meta property="og:locale" content="fr_FR">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{ .Title }}">
<meta name="twitter:description" content="{{ .Description | default .Site.Params.description }}">

<!-- Robots -->
<meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large">

<!-- RSS -->
<link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ "feed.xml" | absURL }}">

<!-- CSS -->
<link rel="stylesheet" href="/css/style.css">
