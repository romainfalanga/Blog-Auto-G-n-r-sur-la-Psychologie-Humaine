<nav class="breadcrumb" aria-label="Fil d'Ariane">
  <a href="/">Accueil</a>
  <span class="separator">&gt;</span>
  {{ if .Params.categories }}
    {{ $cat := index .Params.categories 0 }}
    {{ range .Site.Sections }}
      {{ range .Sections }}
        {{ if eq .Title $cat }}
          <a href="{{ .Permalink }}">{{ .Title }}</a>
          <span class="separator">&gt;</span>
        {{ end }}
      {{ end }}
    {{ end }}
  {{ else if .Parent }}
    <a href="{{ .Parent.Permalink }}">{{ .Parent.Title }}</a>
    <span class="separator">&gt;</span>
  {{ end }}
  <span>{{ .Title }}</span>
</nav>
