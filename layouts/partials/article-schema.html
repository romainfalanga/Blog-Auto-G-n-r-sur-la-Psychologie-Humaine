<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ .Title }}",
  "description": "{{ .Description }}",
  "image": "{{ "images/og-default.png" | absURL }}",
  "author": {
    "@type": "Organization",
    "name": "{{ .Site.Params.siteName }}",
    "url": "{{ .Site.BaseURL }}"
  },
  "publisher": {
    "@type": "Organization",
    "name": "{{ .Site.Params.siteName }}",
    "url": "{{ .Site.BaseURL }}",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ "images/og-default.png" | absURL }}"
    }
  },
  "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  },
  {{- if .Params.categories }}
  "articleSection": "{{ index .Params.categories 0 }}",
  {{- end }}
  {{- if .Params.tags }}
  "keywords": [{{ range $i, $t := .Params.tags }}{{ if $i }}, {{ end }}"{{ $t }}"{{ end }}],
  {{- end }}
  {{- if .Params.wordCount }}
  "wordCount": {{ .Params.wordCount }},
  {{- else }}
  "wordCount": {{ .WordCount }},
  {{- end }}
  "inLanguage": "fr"
}
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Accueil",
      "item": "{{ .Site.BaseURL }}"
    }
    {{- if .Params.categories -}}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": "{{ index .Params.categories 0 }}",
      "item": "{{ .Parent.Permalink }}"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": "{{ .Title }}"
    }
    {{- end }}
  ]
}
</script>
