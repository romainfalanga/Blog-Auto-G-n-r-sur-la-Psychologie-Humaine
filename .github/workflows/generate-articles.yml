name: Génération quotidienne d'articles

on:
  schedule:
    # 2h UTC = 4h heure française (été/CEST). En hiver (CET) : 3h.
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances Python
        run: pip install -r scripts/requirements.txt

      - name: Générer les 3 articles du jour
        env:
          MAMMOUTH_API_KEY: ${{ secrets.MAMMOUTH_API_KEY }}
        run: |
          cd scripts
          python generate_articles.py

      - name: Commit et push des nouveaux articles
        run: |
          git config user.name "Article Bot"
          git config user.email "bot@decode-ton-esprit.com"
          git add content/ scripts/matrice_combinaisons.json scripts/generated_topics.json scripts/personnages.json content/personnages.md
          if git diff --staged --quiet; then
            echo "Aucun changement détecté, rien à committer."
            exit 0
          fi
          git commit -m "3 nouveaux articles - $(date +%Y-%m-%d)"
          # Retry push up to 4 times with exponential backoff
          for i in 1 2 3 4; do
            git pull --rebase origin main && git push origin main && break
            echo "Tentative $i échouée, nouvelle tentative dans $((2 ** i)) secondes..."
            sleep $((2 ** i))
          done
