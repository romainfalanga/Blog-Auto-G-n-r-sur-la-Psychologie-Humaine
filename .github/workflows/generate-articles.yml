name: Génération quotidienne d'articles

on:
  schedule:
    # 10h UTC = 12h heure française (été/CEST). En hiver (CET) : 11h.
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances Python
        run: pip install -r scripts/requirements.txt

      - name: Générer les 3 articles du jour
        env:
          MAMMOUTH_API_KEY: ${{ secrets.MAMMOUTH_API_KEY }}
        run: |
          cd scripts
          python generate_articles.py

      - name: Commit et push des nouveaux articles
        run: |
          git config user.name "Article Bot"
          git config user.email "bot@decode-ton-esprit.com"
          git add .
          git diff --staged --quiet || (git commit -m "3 nouveaux articles - $(date +%Y-%m-%d)" && git pull --rebase && git push)
